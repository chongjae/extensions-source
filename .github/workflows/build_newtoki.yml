name: Build Newtoki APK

on:
  push:
    branches: [ "**" ]
    paths:
      - 'src/ko/manatoki/**'
      - '.github/workflows/build_newtoki.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Newtoki extension
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: ./gradlew :src:ko:manatoki:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: newtoki-apk
          path: "src/ko/manatoki/build/outputs/apk/**/*.apk"
          retention-days: 7
