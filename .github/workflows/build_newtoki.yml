name: Build Newtoki APK

on:
  push:
    branches: [ "**" ]
    paths:
      - 'src/ko/manatoki/**'
      - '.github/workflows/build_newtoki.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Newtoki extension
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: ./gradlew :src:ko:manatoki:assembleRelease

      - name: Find APK
        id: apk
        run: |
          APK=$(find src/ko/manatoki/build/outputs/apk -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "name=$(basename $APK)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: newtoki-latest
          name: Newtoki APK (latest)
          body: "sbxh1.com (뉴토끼) 파서 extension APK"
          files: ${{ steps.apk.outputs.path }}
          make_latest: true
